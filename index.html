<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Define a codificação de caracteres como UTF-8 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lugares pelos Estados Unidos da América">
    <meta name="author" content="Hugo Cunha">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <link rel="stylesheet" href="./pages/index.css">
    <link rel="shortcut icon" href="./brazil-favicon.png" type="image/x-icon">
    <title>BR Afora</title>
</head>

<body>
    <div class="page">
        <!-- Header -->
        <header class="header">
            <h1 class="header__title">Around <span class="header__title-small">The Brazil</span></h1>
        </header>
        <main class="content">
            <section class="profile">
                <div class="profile__content">
                    <!-- Imagem de avatar do perfil -->
                    <img class="profile__avatar" src="./images/avatar-hugo.png" alt="Imagem de uma pessoa">
                    <div class="profile__info">
                        <!-- Nome do Perfil -->
                        <h2 class="profile__name">Hugo Cunha</h2>
                        <!-- Descrição do perfil -->
                        <p class="profile__description">Explorador</p>
                    </div>
                    <!-- Botão para editar o perfil -->
                    <button class="profile__button profile__button_type_edit" type="button" id="edit-button">
                        <img class="profile__icon profile__icon_type_edit" src="./images/profile-edit-button.svg"
                            alt="Botão de editar">
                    </button>
                </div>
                <!-- Botão para adicionar novo item -->
                <button class="profile__button profile__button_type_add" type="button" id="add-button">
                    <img class="profile__icon profile__icon_type_add" src="./images/profile-add-button.svg" alt="Botão de adicionar">
                </button>
            </section>
            
            <section class="elements">
                <div class="elements__cards">
                    <!-- Template para novos cards -->
                     <template class="card__template"> 
                        <div class="card">
                            <div class="card__image-container">
                                <img class="card__image" src="" alt="">
                                <button class="card__delete-button"><img src="./images/trashcap.svg" alt=""> <img src="./images/trashcan.svg" alt=""></button>                                
                            </div>

                            <div class="card__footer">
                                <h2 class="card__title"></h2>
                                <button class="card__like-button"><img src="./images/like-button.svg" alt=""> </button>
                            </div>
                        </div>
                     </template>
                </div>
                
            </section>
        </main>

        <!-- Form -->
        <section class="form"></section>
        <div class="modal">
            <div class="modal__container">
                <button class="modal__close-button" type="button">&times;</button>
                <h2 class="modal__title">Editar perfil</h2>
                <form class="modal__form" id="profile-form">
                    <input type="text" class="modal__input" id="profile-name" name="name" placeholder="Nome" required>
                    <input type="text" class="modal__input" id="profile-description" name="name" placeholder="Sobre mim"
                        required>
                    <button type="submit" class="modal__submit-button">Salvar</button>
                </form>
            </div>
        </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p class="footer__copyright">&copy; 2025 Around The Brazil</p>
        </footer>
    </div>
    <script src="./scripts/index.js"></script>
</body>

</html>
